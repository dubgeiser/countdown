{% extends "index.html" %}

{% block content %}
<form method="POST">
  {{ form.csrf_token }}

  {% if form.errors.items() %}
  <ul class="form-error">
    {% for field, errors in form.errors.items() %}
    <li>{{field}}: {{ errors }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  {{ form.big_count.label }}
  {{ form.big_count() }}

  <input type="submit" value="Start!" />
</form>
{% endblock content %}
